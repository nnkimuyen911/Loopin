<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopin - Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #f8fffe 0%, #fff9f0 100%); 
            min-height: 100vh; 
            padding: 20px; 
            color: #4A4A4A;
        }
        :root { 
            --pastel-green: #A8E6CF; 
            --pastel-green-dark: #7DC4A5; 
            --pastel-blue: #A8D8EA; 
            --pastel-blue-dark: #7BB8CC;
            --pastel-yellow: #FFEAA7; 
            --pastel-pink: #FFB8B8; 
            --pastel-pink-dark: #E89A9A;
            --pastel-purple: #DDA0DD;
            --white: #FFFFFF; 
            --soft-gray: #F5F5F5;
            --text-dark: #4A4A4A; 
            --text-light: #7A7A7A;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        
        .container { max-width: 800px; margin: 0 auto; animation: fadeIn 0.8s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Navbar - Matched to Home */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; background: var(--white); border-radius: 20px; 
            margin-bottom: 30px; box-shadow: var(--shadow); 
        }
        .nav-brand-group { display: flex; align-items: center; gap: 12px; }
        .loopin-logo {
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }
        .loopin-logo svg {
            width: 100%;
            height: 100%;
            display: block;
            background: transparent;
        }
        .loopin-logo .loop {
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: rankingDrawLoop 3s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        }
        .loopin-logo .dot {
            offset-path: path("M100 30 A70 70 0 1 1 99.9 30");
            animation: rankingMoveDot 3s linear infinite;
        }
        .loopin-logo .glow {
            filter: drop-shadow(0 0 10px rgba(255,120,60,0.4));
        }
        .loopin-logo .flame {
            transform-origin: center;
            animation: rankingFlameFloat 1.6s ease-in-out infinite;
        }
        .loopin-logo .flame-outer {
            filter: blur(0.4px) drop-shadow(0 0 12px rgba(255,100,40,0.5));
            animation: rankingFlameWobble 1.6s ease-in-out infinite;
        }
        .loopin-logo .flame-inner {
            opacity: 0.95;
            animation: rankingFlameInner 1.3s ease-in-out infinite;
        }

        @keyframes rankingDrawLoop {
            0% { stroke-dashoffset: 600; opacity: 0; }
            20% { opacity: 1; }
            50% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -600; opacity: 0; }
        }
        @keyframes rankingMoveDot {
            0% { offset-distance: 0%; }
            100% { offset-distance: 100%; }
        }
        @keyframes rankingFlameFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }
        @keyframes rankingFlameWobble {
            0%,100% { transform: scale(1,1) skewX(0deg); }
            50% { transform: scale(1.05,0.95) skewX(-2deg); }
        }
        @keyframes rankingFlameInner {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.08,0.92); }
        }
        .nav-brand { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, var(--pastel-green-dark) 0%, var(--pastel-blue-dark) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        
        .btn-back { 
            background: var(--soft-gray); border: none; padding: 10px 20px; 
            border-radius: 12px; font-weight: 700; cursor: pointer; 
            text-decoration: none; color: var(--text-light); transition: 0.3s;
            font-size: 14px;
        }
        .btn-back:hover { background: var(--pastel-blue); color: #2D3436; }

        /* Header */
        .rank-header { text-align: center; margin-bottom: 40px; }
        .rank-title { font-size: 42px; font-weight: 800; color: var(--text-dark); margin-bottom: 5px; }
        .rank-subtitle { color: var(--text-light); font-weight: 600; font-size: 18px; }

        /* Podium - Refined with Home Colors */
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin-bottom: 40px; padding: 0 10px; }
        .podium-item { 
            background: var(--white); border-radius: 24px; padding: 20px 10px; 
            text-align: center; box-shadow: var(--shadow); flex: 1; position: relative;
            border-bottom: 6px solid transparent;
        }
        .podium-1 { height: 200px; z-index: 2; border-bottom-color: var(--pastel-yellow); }
        .podium-2 { height: 170px; border-bottom-color: var(--pastel-blue); }
        .podium-3 { height: 150px; border-bottom-color: var(--pastel-pink); }
        
        .rank-name { font-weight: 800; color: var(--text-dark); font-size: 15px; margin-bottom: 5px; }
        .rank-streak { 
            display: inline-block; background: #FFF3E0; padding: 5px 12px; 
            border-radius: 20px; font-weight: 800; color: #E65100; font-size: 13px;
        }
        .crown { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 35px; }

        /* Leaderboard Rows - Matched to Habit Cards */
        .leaderboard-card { background: var(--white); border-radius: 30px; padding: 15px; box-shadow: var(--shadow); }
        .rank-row { 
            display: flex; align-items: center; padding: 15px 20px; 
            border-radius: 20px; margin-bottom: 10px; transition: 0.3s;
            border-left: 6px solid var(--soft-gray);
        }
        .rank-row:nth-child(odd) { border-left-color: var(--pastel-blue); }
        .rank-row:nth-child(even) { border-left-color: var(--pastel-purple); }
        
        .rank-number { width: 40px; font-weight: 900; font-size: 18px; color: #B2BEC3; }
        .list-avatar { 
            width: 45px; height: 45px; border-radius: 12px; margin-right: 15px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.35rem; line-height: 1;
            background: linear-gradient(135deg, var(--pastel-pink) 0%, var(--pastel-purple) 100%); 
            color: white; overflow: hidden; flex-shrink: 0;
        }
        /* Make avatar images circular and cover the container */
        .list-avatar { 
            width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.35rem; line-height: 1;
            background: linear-gradient(135deg, var(--pastel-pink) 0%, var(--pastel-purple) 100%); 
            color: white; overflow: hidden; flex-shrink: 0;
        }
        .list-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
        .podium-avatar {
            width: 48px; height: 48px; margin: 0 auto 8px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; line-height: 1;
            background: linear-gradient(135deg, var(--pastel-pink) 0%, var(--pastel-purple) 100%);
            color: white; overflow: hidden;
        }
        /* Podium avatars should also be circular and cover the area */
        .podium-avatar { border-radius: 50%; }
        .podium-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
        .rank-info-name { font-weight: 700; font-size: 16px; color: var(--text-dark); }

        /* Highlight Current User - Matched to "Add Habit" border */
        .me { background: #f0fdf4 !important; border: 2px solid var(--pastel-green) !important; }
        .me .rank-info-name { color: var(--pastel-green-dark); }

        /* Animations */
        @keyframes rankShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-1deg); }
            50% { transform: translateX(5px) rotate(1deg); }
            100% { transform: translateX(0); }
        }
        .rank-up-highlight {
            animation: rankShake 0.5s ease-in-out;
            border: 2px solid var(--pastel-green-dark) !important;
            box-shadow: 0 0 20px rgba(125, 196, 165, 0.4) !important;
        }

        #streak-burst {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 120px; z-index: 9999; pointer-events: none; opacity: 0;
        }
        @keyframes fireBurst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -120%) scale(0.8); opacity: 0; }
        }
        .animate-fire { animation: fireBurst 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>

<div id="streak-burst">🔥</div>

<div class="container">
    <nav class="navbar">
        <div class="nav-brand-group">
            <div class="loopin-logo" aria-label="Loopin logo">
                <svg viewBox="0 0 200 200" role="img" aria-hidden="true">
                    <defs>
                        <linearGradient id="rankingLoopGradient">
                            <stop offset="0%" stop-color="#FFA85C"/>
                            <stop offset="50%" stop-color="#CE65FF"/>
                            <stop offset="100%" stop-color="#5ED4A2"/>
                        </linearGradient>

                        <radialGradient id="rankingFlameOuterGrad" cx="50%" cy="65%" r="60%">
                            <stop offset="0%" stop-color="#FFF3B0"/>
                            <stop offset="40%" stop-color="#FFA85C"/>
                            <stop offset="100%" stop-color="#FF3D00"/>
                        </radialGradient>

                        <radialGradient id="rankingFlameInnerGrad" cx="50%" cy="70%" r="50%">
                            <stop offset="0%" stop-color="#FFFFFF"/>
                            <stop offset="100%" stop-color="#FFB347"/>
                        </radialGradient>
                    </defs>

                    <path
                        d="M100 30 A70 70 0 1 1 99.9 30"
                        fill="none"
                        stroke="url(#rankingLoopGradient)"
                        stroke-width="12"
                        stroke-linecap="round"
                        class="loop glow"
                    />

                    <circle r="4" fill="#FFD166" class="dot glow"></circle>

                    <g class="flame">
                        <path
                            d="M100 120
                               C82 100, 85 78, 98 60
                               C106 72, 118 85, 112 102
                               C109 112, 103 118, 100 120 Z"
                            fill="url(#rankingFlameOuterGrad)"
                            class="flame-outer"
                        />

                        <path
                            d="M100 110
                               C90 95, 96 80, 100 70
                               C105 80, 108 92, 102 108 Z"
                            fill="url(#rankingFlameInnerGrad)"
                            class="flame-inner"
                        />
                    </g>
                </svg>
            </div>
            <span class="nav-brand">Loopin</span>
        </div>
        <a href="/home" class="btn-back">⬅️ Back Home</a>
    </nav>

    <header class="rank-header">
        <h1 class="rank-title">Streak Legends</h1>
        <p class="rank-subtitle">Who's staying in the loop the longest?</p>
    </header>

    <div class="podium" id="topThree"></div>

    <div class="leaderboard-card">
        <div id="leaderboardList">
            <p style="text-align: center; padding: 40px; color: var(--text-light);">Gathering the champions...</p>
        </div>
    </div>
</div>

<script>
    // ... (Script remains exactly the same as your logic was already solid)
    // Just ensured the renderLeaderboard function uses the new class names if changed
    const API_URL = 'http://localhost:3001/api';
    const token = localStorage.getItem('loopin_token');
    const currentUser = JSON.parse(localStorage.getItem('loopin_user') || '{}');
    let lastKnownRank = parseInt(localStorage.getItem('last_rank')) || 100;

    if (!token) window.location.href = '/login';

    function avatarInnerHtml(avatar, username) {
        const letter = (username && username[0]) ? username[0].toUpperCase() : '?';
        // If no avatar provided, fall back to the user's initial (existing behavior)
        if (avatar == null || String(avatar).trim() === '') return letter;

        const a = String(avatar).trim();

        // Treat the following as image sources:
        // - absolute http/https URLs
        // - site-relative uploads starting with /uploads/
        // - data: URIs (base64 inline images)
        // If the avatar matches any of these, render an <img> tag. Otherwise,
        // assume it's a simple emoji or single-character avatar and return it.
        const isImageSrc = /^(https?:\/\/|data:)/i.test(a) || a.startsWith('/uploads/');
        if (isImageSrc) {
            // Minimal HTML-escaping for safety in this small client-side context
            const safe = a.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            return `<img src="${safe}" alt="${(username||'avatar')}">`;
        }

        // Fallback: return whatever textual avatar value was provided (e.g., emoji)
        return a;
    }

    function triggerFireAnimation() {
        const fire = document.getElementById('streak-burst');
        fire.classList.remove('animate-fire');
        void fire.offsetWidth; 
        fire.classList.add('animate-fire');
    }

    function renderLeaderboard(leaders) {
    const topThreeContainer = document.getElementById('topThree');
    const listContainer = document.getElementById('leaderboardList');
    
    // Create a cleaned-up version of your username for comparison
    const myName = (currentUser.username || "").toLowerCase().trim();

    if (leaders.length > 0) {
        const top1 = leaders[0];
        const top2 = leaders[1] || { username: "---", longestStreak: 0, avatar: null };
        const top3 = leaders[2] || { username: "---", longestStreak: 0, avatar: null };

        // Update podium checks to use case-insensitive comparison
        const isTop1Me = top1.username.toLowerCase().trim() === myName;
        const isTop2Me = top2.username.toLowerCase().trim() === myName;
        const isTop3Me = top3.username.toLowerCase().trim() === myName;

        topThreeContainer.innerHTML = `
            <div class="podium-item podium-2 ${isTop2Me ? 'me' : ''}">
                <div style="font-size:25px; margin-bottom:10px;">🥈</div>
                <div class="podium-avatar">${avatarInnerHtml(top2.avatar, top2.username)}</div>
                <div class="rank-name">${top2.username}</div>
                <div class="rank-streak">${top2.longestStreak} 🔥</div>
            </div>
            <div class="podium-item podium-1 ${isTop1Me ? 'me' : ''}">
                <div class="crown">👑</div>
                <div style="font-size:30px; margin-bottom:10px;">🥇</div>
                <div class="podium-avatar">${avatarInnerHtml(top1.avatar, top1.username)}</div>
                <div class="rank-name">${top1.username}</div>
                <div class="rank-streak">${top1.longestStreak} 🔥</div>
            </div>
            <div class="podium-item podium-3 ${isTop3Me ? 'me' : ''}">
                <div style="font-size:25px; margin-bottom:10px;">🥉</div>
                <div class="podium-avatar">${avatarInnerHtml(top3.avatar, top3.username)}</div>
                <div class="rank-name">${top3.username}</div>
                <div class="rank-streak">${top3.longestStreak} 🔥</div>
            </div>
        `;
    }

    listContainer.innerHTML = leaders.map((user, index) => {
        // Update list check to use case-insensitive comparison
        const isMe = user.username.toLowerCase().trim() === myName;
        return `
            <div class="rank-row ${isMe ? 'me' : ''}" id="${isMe ? 'my-rank-row' : ''}">
                <div class="rank-number">#${index + 1}</div>
                <div class="list-avatar">${avatarInnerHtml(user.avatar, user.username)}</div>
                <div style="flex:1">
                    <div class="rank-info-name">${user.username} ${isMe ? '(You)' : ''}</div>
                </div>
                <div class="rank-streak">${user.longestStreak} 🔥</div>
            </div>
        `;
    }).join('');
}
   async function fetchLeaderboard() {
        try {
            const response = await fetch(`${API_URL}/leaderboard`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const res = await response.json();
            
            if (res.success) {
                renderLeaderboard(res.data);
                const myName = (currentUser.username || "").toLowerCase().trim();
                const myIndex = res.data.findIndex(u => u.username.toLowerCase().trim() === myName);
                if (myIndex !== -1) {
                    const currentRank = myIndex + 1;
                    if (currentRank < lastKnownRank) {
                        triggerFireAnimation();
                        setTimeout(() => {
                            const myElement = document.querySelector('.me');
                            if (myElement) {
                                myElement.classList.add('rank-up-highlight');
                                document.querySelector('.rank-subtitle').innerText = "You just climbed the ranks! 🚀";
                                setTimeout(() => {
                                    myElement.classList.remove('rank-up-highlight');
                                    document.querySelector('.rank-subtitle').innerText = "Who's staying in the loop the longest?";
                                }, 3500);
                            }
                        }, 200);
                    }
                    lastKnownRank = currentRank;
                    localStorage.setItem('last_rank', lastKnownRank);
                }
            }
        } catch (error) {
            console.error("Fetch error", error);
        }
    }

    fetchLeaderboard();
</script>
</body>
</html>
