<!DOCTYPE html>
<!-- saved from url=(0040)https://web-sandbox.oaiusercontent.com/? -->
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Loopin Transparent Logo</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    /* ❌ XÓA nền */
    background: transparent;
  }

  svg {
    width: 240px;
    height: 240px;
    background: transparent; /* đảm bảo SVG cũng trong suốt */
  }

  /* LOOP */
  .loop {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: drawLoop 3s cubic-bezier(0.65, 0, 0.35, 1) infinite;
  }

  @keyframes drawLoop {
    0% { stroke-dashoffset: 600; opacity: 0; }
    20% { opacity: 1; }
    50% { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: -600; opacity: 0; }
  }

  /* DOT */
  .dot {
    offset-path: path("M100 30 A70 70 0 1 1 99.9 30");
    animation: moveDot 3s linear infinite;
  }

  @keyframes moveDot {
    0% { offset-distance: 0%; }
    100% { offset-distance: 100%; }
  }

  /* GLOW */
  .glow {
    filter: drop-shadow(0 0 14px rgba(255,120,60,0.5));
  }

  /* FLAME */
  .flame {
    transform-origin: center;
    animation: flameFloat 1.6s ease-in-out infinite;
  }

  @keyframes flameFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }

  .flame-outer {
    filter: blur(0.4px) drop-shadow(0 0 16px rgba(255,100,40,0.6));
    animation: flameWobble 1.6s ease-in-out infinite;
  }

  .flame-inner {
    opacity: 0.95;
    animation: flameInner 1.3s ease-in-out infinite;
  }

  @keyframes flameWobble {
    0%,100% { transform: scale(1,1) skewX(0deg); }
    50% { transform: scale(1.05,0.95) skewX(-2deg); }
  }

  @keyframes flameInner {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08,0.92); }
  }

</style>
<style>html,body,#root{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;margin:0;padding:0}html,body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Oxygen,Ubuntu,Cantarell,Helvetica Neue,Arial,sans-serif!important}button,input,textarea,select{font-family:inherit}html{background-color:#fff}html.dark{background-color:#212121}html.mobileSkybridge.dark{background-color:#000}@supports (font: -apple-system-body){html.mobileSkybridge{font:-apple-system-body}}html.desktopSkybridge.dark{background-color:#1e1e1e}html.androidSkybridge,html.androidSkybridge body,html.androidSkybridge *{-webkit-tap-highlight-color:rgba(255,255,255,0)}html.androidSkybridge *::selection,html.androidSkybridge *::-moz-selection{background:#fff0;color:inherit}</style></head>

<body>

<svg viewBox="0 0 200 200">

  <defs>
    <lineargradient id="loopGradient">
      <stop offset="0%" stop-color="#FFA85C"></stop>
      <stop offset="50%" stop-color="#CE65FF"></stop>
      <stop offset="100%" stop-color="#5ED4A2"></stop>
    </lineargradient>

    <radialgradient id="flameOuterGrad" cx="50%" cy="65%" r="60%">
      <stop offset="0%" stop-color="#FFF3B0"></stop>
      <stop offset="40%" stop-color="#FFA85C"></stop>
      <stop offset="100%" stop-color="#FF3D00"></stop>
    </radialgradient>

    <radialgradient id="flameInnerGrad" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"></stop>
      <stop offset="100%" stop-color="#FFB347"></stop>
    </radialgradient>
  </defs>

  <!-- LOOP -->
  <path d="M100 30 A70 70 0 1 1 99.9 30" fill="none" stroke="url(#loopGradient)" stroke-width="12" stroke-linecap="round" class="loop glow"></path>

  <!-- DOT -->
  <circle r="4" fill="#FFD166" class="dot glow"></circle>

  <!-- FLAME -->
  <g class="flame">

    <path d="M100 120
         C82 100, 85 78, 98 60
         C106 72, 118 85, 112 102
         C109 112, 103 118, 100 120 Z" fill="url(#flameOuterGrad)" class="flame-outer"></path>

    <path d="M100 110
         C90 95, 96 80, 100 70
         C105 80, 108 92, 102 108 Z" fill="url(#flameInnerGrad)" class="flame-inner"></path>

  </g>

</svg>


</body></html>
