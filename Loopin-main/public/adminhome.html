<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopin - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: #f0f2f5; min-height: 100vh; padding: 20px; }
        
        :root { 
            --admin-purple: #6c5ce7; --admin-dark: #2d3436;
            --pastel-green: #A8E6CF; --pastel-blue: #A8D8EA; 
            --pastel-pink: #FFB8B8; --white: #FFFFFF; 
        }

        .container { max-width: 1100px; margin: 0 auto; }

        .admin-nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--admin-dark); color: white; border-radius: 15px; margin-bottom: 30px; }
        .badge { background: var(--admin-purple); padding: 5px 12px; border-radius: 8px; font-size: 12px; text-transform: uppercase; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { font-size: 28px; color: var(--admin-purple); margin-top: 10px; }
        .stat-card p { color: #636e72; font-weight: 700; font-size: 14px; }

        .management-section { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; color: #b2bec3; font-size: 13px; text-transform: uppercase; border-bottom: 2px solid #f1f2f6; }
        td { padding: 15px; border-bottom: 1px solid #f1f2f6; color: var(--admin-dark); font-weight: 600; }
        
        .btn-action { padding: 8px 15px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Nunito'; font-weight: 700; transition: 0.2s; }
        .btn-view { background: var(--pastel-blue); color: #2980b9; }
        .btn-action:hover { filter: brightness(0.9); transform: translateY(-1px); }

        #searchUsers { padding:10px; border-radius:10px; border:1px solid #dfe6e9; width:250px; outline: none; }

        /* Modal Styles */
        #userModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:30px; border-radius:25px; width:90%; max-width:500px; position:relative; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .close-btn { position:absolute; top:15px; right:20px; cursor:pointer; font-size:28px; color:#b2bec3; }
        .habit-card { background:#f8f9fa; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
    </style>
</head>
<body>
    <div id="userModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalUsername">User Habits</h2>
            <p id="modalEmail" style="color:#636e72; margin-bottom:20px; font-size:14px;"></p>
            <div id="habitList" style="max-height:400px; overflow-y:auto;">
                </div>
        </div>
    </div>

    <div class="container">
        <nav class="admin-nav">
            <div>
                <span class="badge">System Admin</span>
                <h2 style="margin-top: 5px;">Loopin Control Center</h2>
            </div>
            <button onclick="logout()" style="background:none; border:1px solid #636e72; color:white; padding:8px 15px; border-radius:10px; cursor:pointer;">Exit Panel</button>
        </nav>

        <div class="stats-grid">
            <div class="stat-card">
                <p>TOTAL USERS</p>
                <h3 id="totalUsers">0</h3>
            </div>
            <div class="stat-card">
                <p>ACTIVE HABITS</p>
                <h3 id="totalHabits">0</h3>
            </div>
            <div class="stat-card">
                <p>TOP STREAK</p>
                <h3 id="topStreak">0 🔥</h3>
            </div>
            <div class="stat-card">
                <p>SYSTEM HEALTH</p>
                <h3 id="systemHealth" style="color: var(--pastel-green);">Checking...</h3>
            </div>
        </div>

        <section class="management-section">
            <div class="section-header">
                <h2>User Management</h2>
                <input type="text" id="searchUsers" placeholder="Search by username or email...">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Joined</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="5" style="text-align:center;">Fetching data...</td></tr>
                </tbody>
            </table>
        </section>
    </div>

    <script>
        const token = localStorage.getItem('loopin_token');
        if (!token) window.location.href = '/login';

        let allUsers = [];

        async function fetchAdminData() {
    try {
        const res = await fetch('/api/admin/dashboard', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        
        if (data.success) {
            document.getElementById('totalUsers').textContent = data.stats.totalUsers;
            document.getElementById('totalHabits').textContent = data.stats.totalHabits;
            allUsers = data.users;
            renderUserTable(allUsers);
            // Display top streak
            document.getElementById('topStreak').textContent = `${data.stats.topStreak} 🔥`;
            // Simple health check based on system status
            const healthEl = document.getElementById('systemHealth');
            healthEl.textContent = data.stats.systemStatus || 'Active';
            healthEl.style.color = data.stats.systemStatus === 'Healthy' ? '#A8E6CF' : '#ff7675';
        } else {
            window.location.href = '/home';
        }
    } catch (err) {
        console.error("Auth error", err);
        window.location.href = '/login';
    }
}
        function renderUserTable(users) {
            const body = document.getElementById('userTableBody');
            body.innerHTML = users.map(user => `
                <tr>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                    <td><span class="badge" style="background:${user.role === 'admin' ? '#fdcb6e' : '#b2bec3'}">${user.role}</span></td>
                    <td><button class="btn-action btn-view" onclick="viewUser('${user._id}', '${user.username}', '${user.email}')">View</button></td>
                </tr>
            `).join('');
        }

        async function viewUser(id, username, email) {
            const modal = document.getElementById('userModal');
            const habitList = document.getElementById('habitList');
            document.getElementById('modalUsername').textContent = `${username}'s Habits`;
            document.getElementById('modalEmail').textContent = email;
            habitList.innerHTML = 'Loading...';
            modal.style.display = 'flex';

            try {
                const res = await fetch(`/api/habits/user/${id}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const habits = await res.json();
                habitList.innerHTML = habits.length ? habits.map(h => `
                    <div class="habit-card">
                        <span>${h.icon} <strong>${h.name}</strong></span>
                        <span>${h.streak} 🔥</span>
                    </div>
                `).join('') : '<p style="text-align:center; color:#b2bec3;">No active habits.</p>';
            } catch (err) { habitList.innerHTML = 'Error loading habits.'; }
        }

        function closeModal() { document.getElementById('userModal').style.display = 'none'; }

        document.getElementById('searchUsers').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            renderUserTable(allUsers.filter(u => u.username.toLowerCase().includes(term) || u.email.toLowerCase().includes(term)));
        });

        async function logout() {
            try {
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (e) {
                console.warn('Logout API call failed, continuing local cleanup.', e);
            }

            localStorage.clear();
            sessionStorage.clear();
            window.location.replace('/login');
        }
        fetchAdminData();
    </script>
</body>
</html>
